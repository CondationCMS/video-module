<iframe
    {% if video.dnt %}
        src="https://player.vimeo.com/video/{{video.id}}?dnt=true&{{video.queryParameters}}"
    {% else %}
        src="https://player.vimeo.com/video/{{video.id}}?{{video.queryParameters}}"
    {% endif %}
	frameborder="0" 
	style="display: block; width: 100%; height: auto; aspect-ratio: {{video.aspectRatio}}"
	title="{{video.title}}" 
	allow="{{video.allowAttribute}}"
	{{video.extras}} >
</iframe>
