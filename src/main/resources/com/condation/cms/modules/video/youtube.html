<iframe
    {% if video.nocookie %}
        src="https://www.youtube-nocookie.com/embed/{{video.id}}?{{video.queryParameters}}"
    {% else %}
        src="https://www.youtube.com/embed/{{video.id}}?{{video.queryParameters}}"
    {% endif %}
	frameborder="0" 
	style="width: 100%;height: 100%"
	title="{{ video.title }}"
	allow="{{ video.allowAttribute }}"
	{{video.extras}} >
</iframe>
